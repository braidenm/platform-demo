name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  identity-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Start test infrastructure only
        run: docker compose up -d postgres mongodb

      - name: Wait for test infrastructure health
        run: |
          docker compose ps
          until [ "$(docker inspect -f '{{.State.Health.Status}}' platform-demo-postgres 2>/dev/null)" = "healthy" ]; do sleep 2; done
          until [ "$(docker inspect -f '{{.State.Health.Status}}' platform-demo-mongodb 2>/dev/null)" = "healthy" ]; do sleep 2; done

      - name: Run identity build and tests against compose-backed test infrastructure
        run: ./gradlew :services:identity:build --warning-mode all
