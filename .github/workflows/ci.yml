name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  identity-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    env:
      COMPOSE_FILE: docker-compose.test.yml
      COMPOSE_PROJECT_NAME: platform-demo-ci-${{ github.run_id }}-${{ github.run_attempt }}
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: "0"
      TEST_MONGO_HOST: 127.0.0.1
      TEST_MONGO_PORT: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Start test infrastructure only
        run: |
          set -euo pipefail
          docker compose up -d postgres mongodb
          docker compose ps

      - name: Resolve mapped infrastructure ports
        run: |
          set -euo pipefail
          postgres_address="$(docker compose port postgres 5432)"
          mongodb_address="$(docker compose port mongodb 27017)"
          if [ -z "${postgres_address}" ] || [ -z "${mongodb_address}" ]; then
            echo "Failed to resolve mapped infrastructure ports."
            docker compose ps
            exit 1
          fi

          echo "TEST_DB_PORT=$(echo "${postgres_address}" | awk -F: '{print $NF}')" >> "${GITHUB_ENV}"
          echo "TEST_MONGO_PORT=$(echo "${mongodb_address}" | awk -F: '{print $NF}')" >> "${GITHUB_ENV}"
          echo "Mapped test ports: postgres=${postgres_address}, mongodb=${mongodb_address}"

      - name: Wait for test infrastructure health
        run: |
          set -euo pipefail
          wait_for_service_health() {
            local service="$1"
            local timeout_seconds="$2"
            local start_time="$SECONDS"
            local container_id=""
            local health_state=""

            while true; do
              container_id="$(docker compose ps -q "${service}")"
              if [ -n "${container_id}" ]; then
                health_state="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container_id}" 2>/dev/null || true)"
                if [ "${health_state}" = "healthy" ]; then
                  echo "${service} is healthy"
                  return 0
                fi
                if [ "${health_state}" = "unhealthy" ] || [ "${health_state}" = "exited" ] || [ "${health_state}" = "dead" ]; then
                  echo "${service} entered failing state: ${health_state}"
                  docker compose ps
                  docker compose logs --no-color "${service}" || true
                  return 1
                fi
              fi

              if [ $((SECONDS - start_time)) -ge "${timeout_seconds}" ]; then
                echo "Timed out waiting for ${service} to become healthy after ${timeout_seconds}s"
                docker compose ps
                docker compose logs --no-color "${service}" || true
                return 1
              fi

              echo "Waiting for ${service} health (status: ${health_state:-starting})"
              sleep 2
            done
          }

          docker compose ps
          wait_for_service_health postgres 120
          wait_for_service_health mongodb 120

      - name: Run identity build and tests against compose-backed test infrastructure
        run: ./gradlew :services:identity:build --warning-mode all --stacktrace --no-daemon

      - name: Dump infrastructure diagnostics on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --no-color --tail=200 postgres mongodb || true
          for service in postgres mongodb; do
            container_id="$(docker compose ps -q "${service}")"
            if [ -n "${container_id}" ]; then
              echo "Health diagnostics for ${service} (${container_id}):"
              docker inspect --format '{{json .State.Health}}' "${container_id}" || true
            fi
          done

      - name: Tear down test infrastructure
        if: always()
        run: docker compose down -v --remove-orphans
