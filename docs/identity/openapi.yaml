openapi: 3.1.0
info:
  title: Platform Demo Identity API
  version: 1.3.0
  summary: Current identity API plus planned auth/session contract.
  description: |
    Current contract for the identity module in the modular monolith.

    Current implementation:
    - Registration is synchronous and returns the created user identifier.
    - Registration supports idempotent retries via `Idempotency-Key`.

    Planned next auth slice:
    - Login, refresh, logout, and me endpoints.
    - Access tokens expire after 15 minutes.
    - Refresh tokens expire after 30 days.
    - Refresh tokens rotate on every successful refresh.
    - Logout revokes the active refresh token/session.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Registration
  - name: Auth
  - name: Users

paths:
  /v1/register-user:
    post:
      tags: [Registration]
      summary: Register a user synchronously
      description: Creates a user and returns the created user identifier.
      operationId: registerUser
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/login:
    post:
      tags: [Auth]
      summary: Authenticate a user and create a session
      description: |
        Planned endpoint.

        Intended token policy:
        - Access token lifetime: 15 minutes (`expires_in=900`).
        - Refresh token lifetime: 30 days (`refresh_expires_in=2592000`).
        - Refresh token is rotated whenever `/v1/refresh` succeeds.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and mint a new access token
      description: |
        Planned endpoint.

        Intended refresh behavior:
        - The provided refresh token must be active and unexpired.
        - A successful refresh invalidates the previous refresh token.
        - The response returns a new access token and a new refresh token.
        - Reuse of a rotated refresh token is invalid and should be rejected.
      operationId: refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token/session
      description: |
        Planned endpoint.

        Intended logout behavior:
        - Revokes the submitted refresh token/session.
        - Subsequent refresh attempts with that token must fail.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out and refresh token revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user/session context
      description: Planned endpoint.
      operationId: me
      responses:
        '200':
          description: Current user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/users/{userId}:
    get:
      tags: [Users]
      summary: Get user by identifier
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Safe retry key for create operations.
      schema:
        type: string
        minLength: 8
        maxLength: 128

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    RegisterUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          minLength: 1
          maxLength: 120

    UserRegistrationResponse:
      type: object
      required: [user_id, email, status, created_at]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DEACTIVATED]
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenSessionResponse:
      type: object
      required: [access_token, token_type, expires_in, refresh_token, refresh_expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
          example: 900
        refresh_token:
          type: string
        refresh_expires_in:
          type: integer
          description: Refresh token lifetime in seconds.
          example: 2592000
        scope:
          type: string
          description: Space-delimited scopes when applicable.

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
        session_expires_in:
          type: integer
          description: Remaining access-token lifetime in seconds when returned.
        refresh_expires_in:
          type: integer
          description: Remaining refresh-token lifetime in seconds when returned.

    User:
      type: object
      required: [id, email, status, email_verified, created_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DEACTIVATED]
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum:
                - invalid_request
                - unauthorized
                - forbidden
                - not_found
                - conflict
                - rate_limited
                - internal_error
            message:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true
