openapi: 3.1.0
info:
  title: Platform Demo Identity API
  version: 1.5.0
  summary: Current identity API plus planned auth and federation contract.
  description: |
    Contract-first definition for the identity module.

    Implemented now:
    - Register user
    - Get user by id
    - Login with local credentials

    Planned next:
    - refresh / logout / me
    - OIDC auth endpoints
    - provider connection management endpoints
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Registration
  - name: Auth
  - name: Connections
  - name: Users

paths:
  /v1/register-user:
    post:
      tags: [Registration]
      summary: Register a user synchronously
      description: Creates a user and returns the created user identifier.
      operationId: registerUser
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/login:
    post:
      tags: [Auth]
      summary: Authenticate with local credentials
      description: |
        Validates local email/password credentials and creates a refresh-backed session.
        Returns a short-lived access token and a long-lived refresh token.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and mint a new access token
      description: Planned local auth endpoint.
      operationId: refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token/session
      description: Planned local auth endpoint.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out and refresh token revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user/session context
      description: Planned local auth endpoint.
      operationId: me
      responses:
        '200':
          description: Current user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/oidc/login:
    post:
      tags: [Auth]
      summary: Begin or complete OIDC login
      description: Planned OIDC/social auth endpoint.
      operationId: oidcLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcLoginRequest'
      responses:
        '200':
          description: OIDC-authenticated session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/oidc/callback:
    post:
      tags: [Auth]
      summary: Complete OIDC callback exchange
      description: Planned OIDC/social auth endpoint.
      operationId: oidcCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcCallbackRequest'
      responses:
        '200':
          description: OIDC callback accepted and session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/connections:
    get:
      tags: [Connections]
      summary: List linked provider connections
      description: Planned account-linking endpoint.
      operationId: listConnections
      responses:
        '200':
          description: Linked provider connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connection'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/connections/{provider}:
    post:
      tags: [Connections]
      summary: Link a provider connection to the current account
      description: Planned account-linking endpoint.
      operationId: createConnection
      parameters:
        - $ref: '#/components/parameters/Provider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectionRequest'
      responses:
        '201':
          description: Provider connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags: [Connections]
      summary: Remove a linked provider connection
      description: Planned account-linking endpoint.
      operationId: deleteConnection
      parameters:
        - $ref: '#/components/parameters/Provider'
      responses:
        '204':
          description: Provider connection removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/users/{userId}:
    get:
      tags: [Users]
      summary: Get user by identifier
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    Provider:
      name: provider
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Safe retry key for create operations.
      schema:
        type: string
        minLength: 8
        maxLength: 128

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    RegisterUserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          minLength: 1
          maxLength: 120

    UserRegistrationResponse:
      type: object
      required: [user_id, email, status, created_at]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DEACTIVATED]
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    OidcLoginRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
        authorization_code:
          type: string
        id_token:
          type: string
        redirect_uri:
          type: string
          format: uri

    OidcCallbackRequest:
      type: object
      required: [provider, code]
      properties:
        provider:
          type: string
        code:
          type: string
        redirect_uri:
          type: string
          format: uri
        state:
          type: string

    CreateConnectionRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
        authorization_code:
          type: string
        id_token:
          type: string
        redirect_uri:
          type: string
          format: uri

    TokenSessionResponse:
      type: object
      required: [access_token, token_type, expires_in, refresh_token, refresh_expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          example: 900
        refresh_token:
          type: string
        refresh_expires_in:
          type: integer
          example: 2592000
        scope:
          type: string

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
        session_expires_in:
          type: integer
        refresh_expires_in:
          type: integer

    Connection:
      type: object
      required: [provider, subject, linked_at]
      properties:
        provider:
          type: string
        subject:
          type: string
        linked_at:
          type: string
          format: date-time

    User:
      type: object
      required: [id, email, status, email_verified, created_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DEACTIVATED]
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true
